<svg width="1000" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#8a2be2"/>
    </linearGradient>
    <symbol id="skull" viewBox="0 0 64 64">
      <g fill="white" stroke="black" stroke-width="2">
        <circle cx="32" cy="24" r="18"/>
        <circle cx="24" cy="20" r="4" fill="black"/>
        <circle cx="40" cy="20" r="4" fill="black"/>
        <path d="M28 34 v8 m8-8 v8 m-16-4 h24" stroke="black" stroke-width="2" fill="none"/>
      </g>
    </symbol>
    <clipPath id="clip">
      <rect x="0" y="0" width="1000" height="220" rx="16"/>
    </clipPath>
  </defs>
  <style>
    .title {
      font: 700 88px 'Segoe UI', Roboto, sans-serif;
      fill: none;
      stroke: url(#g);
      stroke-width: 2.5;
      letter-spacing: 4px;
      stroke-linejoin: round;
      stroke-linecap: round;
      stroke-dasharray: 1600;
      stroke-dashoffset: 1600;
      animation: draw 2.4s ease forwards, glow 3s ease-in-out 2.4s infinite alternate;
    }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes glow { 
      from { filter: drop-shadow(0 0 0 rgba(138,43,226,0.0)); }
      to   { filter: drop-shadow(0 0 8px rgba(138,43,226,0.6)); }
    }
    .fill { fill: url(#g); opacity: 0; animation: fillin .6s ease forwards 2.2s; }
    @keyframes fillin { to { opacity: 1; } }
    .skull { opacity: .8; transform: scale(0.4); animation: fall linear infinite; }
    @keyframes fall {
      0%   { transform: translateY(-20px) scale(0.4) rotate(0deg);   opacity: .8; }
      90%  { opacity: .8; }
      100% { transform: translateY(240px) scale(0.4) rotate(180deg); opacity: 0; }
    }
  </style>

  <!-- Title -->
  <text x="50%" y="55%" text-anchor="middle" class="title">Jason Ovalle</text>
  <text x="50%" y="88%" text-anchor="middle" class="fill" font-size="26" letter-spacing="2">Software &amp; IT</text>

  <!-- Falling skulls -->
  <g clip-path="url(#clip)">
    <!-- Row 1 -->
    <use href="#skull" x="60"  y="0"  class="skull" style="animation-duration:7s; animation-delay:0s;" />
    <use href="#skull" x="160" y="0"  class="skull" style="animation-duration:8s; animation-delay:1s;" />
    <use href="#skull" x="260" y="0"  class="skull" style="animation-duration:6.5s; animation-delay:.5s;" />
    <use href="#skull" x="360" y="0"  class="skull" style="animation-duration:7.5s; animation-delay:1.2s;" />
    <use href="#skull" x="460" y="0"  class="skull" style="animation-duration:8.2s; animation-delay:.8s;" />
    <use href="#skull" x="560" y="0"  class="skull" style="animation-duration:7.2s; animation-delay:1.6s;" />
    <use href="#skull" x="660" y="0"  class="skull" style="animation-duration:6.8s; animation-delay:.2s;" />
    <use href="#skull" x="760" y="0"  class="skull" style="animation-duration:7.8s; animation-delay:1.8s;" />
    <use href="#skull" x="860" y="0"  class="skull" style="animation-duration:7.1s; animation-delay:.4s;" />
    <use href="#skull" x="960" y="0"  class="skull" style="animation-duration:8.4s; animation-delay:1.1s;" />

    <!-- Row 2 -->
    <use href="#skull" x="110" y="-50" class="skull" style="animation-duration:9s; animation-delay:.3s;" />
    <use href="#skull" x="210" y="-50" class="skull" style="animation-duration:6.9s; animation-delay:1.5s;" />
    <use href="#skull" x="310" y="-50" class="skull" style="animation-duration:8.6s; animation-delay:.9s;" />
    <use href="#skull" x="410" y="-50" class="skull" style="animation-duration:7.3s; animation-delay:1.7s;" />
    <use href="#skull" x="510" y="-50" class="skull" style="animation-duration:8.8s; animation-delay:.1s;" />
    <use href="#skull" x="610" y="-50" class="skull" style="animation-duration:7.6s; animation-delay:.6s;" />
    <use href="#skull" x="710" y="-50" class="skull" style="animation-duration:8.1s; animation-delay:1.3s;" />
    <use href="#skull" x="810" y="-50" class="skull" style="animation-duration:7.4s; animation-delay:.7s;" />
    <use href="#skull" x="910" y="-50" class="skull" style="animation-duration:8.3s; animation-delay:1.9s;" />
  </g>
</svg>